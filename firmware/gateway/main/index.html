<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            width: 300px;
        }
        h1 {
            font-size: 1.5rem;
            color: #bb86fc;
            margin-bottom: 5px;
        }
        .display-container {
            margin: 20px 0;
        }
        .display-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaaaaa;
        }
        .display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #03dac6;
            margin-bottom: 15px;
        }
        .sub-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffb74d;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 1.5rem;
            border: none;
            border-radius: 8px;
            background-color: #332940;
            color: #ffffff;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
            background-color: #bb86fc;
            color: #000000;
        }
        hr {
            border: 0;
            height: 1px;
            background: #333;
            margin: 15px 0;
        }
    </style>
    <script>
        function updateUI(data) {
            if (data.power !== undefined) {
                document.getElementById('power').innerText = data.power + '%';
            }
            if (data.potentiometer !== undefined) {
                document.getElementById('pot').innerText = data.potentiometer + '%';
            }
        }

        function changePower(action) {
            fetch('/api/led?action=' + action)
                .then(r => r.json())
                .then(d => updateUI(d))
                .catch(e => console.error("Error updating power:", e));
        }

        function pollStatus() {
            fetch('/api/led')
                .then(r => r.json())
                .then(d => updateUI(d))
                .catch(e => console.error("Polling error:", e));
        }

        document.addEventListener("DOMContentLoaded", () => {
            setInterval(pollStatus, 400);
        });
    </script>
</head>
<body>
    <div class="card">
        <h1>LED CONTROL</h1>
        
        <div class="display-container">
            <div class="display-label">LED Power</div>
            <div class="display" id="power">50%</div>
            
            <hr>
            
            <div class="display-label">Potentiometer</div>
            <div class="sub-display" id="pot">0%</div>
        </div>

        <div class="btn-container">
            <button onclick="changePower('decrease')">-</button>
            <button onclick="changePower('increase')">+</button>
        </div>
    </div>
</body>
</html>
